<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Sign Up</title>
		<link rel="stylesheet" href="/src/style.css" />
		<script src="/src/js/config.js"></script>
<script src="/src/js/auth.js" defer></script>
	</head>

	<body class="bg-forest-50 min-h-screen flex items-center justify-center">
		<!-- Card -->
		<div
			class="w-full max-w-md bg-white rounded-sm shadow-lg shadow-forest-900/10 p-8">
			<!-- Heading -->
			<h2 class="text-2xl font-bold text-forest-900 text-center mb-2">
				Create Account
			</h2>
			<p class="text-sm text-forest-600 text-center mb-6">
				Join us and get started
			</p>

			<!-- Form -->
			<form class="space-y-4" id="signupForm">
				<!-- Name -->
				<input
					type="text"
					id="signupName"
					placeholder="Full Name"
					class="w-full px-4 py-3 border border-forest-200 rounded-sm focus:outline-none focus:ring-2 focus:ring-saffron-300"
					required />

				<!-- Email -->
				<input
					type="email"
					id="signupEmail"
					placeholder="Email Address"
					class="w-full px-4 py-3 border border-forest-200 rounded-sm focus:outline-none focus:ring-2 focus:ring-saffron-300"
					required />

				<!-- Password -->
				<input
					type="password"
					id="signupPassword"
					placeholder="Password"
					class="w-full px-4 py-3 border border-forest-200 rounded-sm focus:outline-none focus:ring-2 focus:ring-saffron-300"
					required />

				<!-- Confirm Password -->
				<input
					type="password"
					id="signupConfirmPassword"
					placeholder="Confirm Password"
					class="w-full px-4 py-3 border border-forest-200 rounded-sm focus:outline-none focus:ring-2 focus:ring-saffron-300"
					required />

					<input
					type="number"
					id="phone"
					minlength="10"
					maxlength="10"
					placeholder="Contact"
					class="w-full px-4 py-3 border border-forest-200 rounded-sm focus:outline-none focus:ring-2 focus:ring-saffron-300"
					required />

				<!-- Role -->
				<div class="flex justify-between gap-2 text-gray-400">
					<label
						class="flex items-center gap-2 border border-forest-200 px-3 py-2 rounded-sm w-full cursor-pointer font-normal opacity-100">
						<input type="radio" name="role" value="user" required />
						User
					</label>

					<label
						class="flex items-center gap-2 border border-forest-200 px-3 py-2 rounded-sm w-full cursor-pointer font-normal opacity-100">
						<input type="radio" name="role" value="admin" />
						Admin
					</label>

					<label
						class="flex items-center gap-2 border border-forest-200 px-3 py-2 rounded-sm w-full cursor-pointer font-normal opacity-100">
						<input type="radio" name="role" value="vendor" />
						Vendor
					</label>
				</div>

				<!-- Signup Button -->
				<input
					type="submit"
					class="w-full bg-saffron-400 hover:bg-saffron-300 text-forest-900 font-bold text-sm px-5 py-3 rounded-sm transition-all hover:-translate-y-0.5 shadow-md shadow-saffron-400/30" value="Sign Up">
				</input>
			</form>

			<!-- Divider -->
			<div class="flex items-center my-6">
				<div class="flex-1 h-px bg-forest-200"></div>
				<span class="px-3 text-xs text-forest-500">OR</span>
				<div class="flex-1 h-px bg-forest-200"></div>
			</div>

			<!-- Login Link (Secondary style matching earlier) -->
			<a
				href="/src/pages/login.html"
				class="inline-block w-full text-center bg-white/80 backdrop-blur-sm text-forest-900 font-semibold text-sm px-5 py-3 rounded-sm border border-forest-200 shadow-md shadow-forest-900/5 hover:bg-white hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200">
				Already have an account?
			</a>
		</div>
	</body>
</html>
